<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정보관리기술사 학습 노트</title>
  <meta name="description" content="정보관리기술사 시험 대비 주제별 답안형 요약 노트" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="index.html" class="brand">
        <span class="brand-mark">IM</span>
        <span class="brand-text">정보관리기술사 <b>학습 노트</b></span>
      </a>
      <p class="tagline">주제별 답안형 요약을 하나씩 쌓아가는 공부 아카이브</p>
    </div>
  </header>

  <main class="wrap">
    <section class="search-section">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input
          id="search"
          type="search"
          placeholder="주제, 태그, 카테고리로 검색  (예: 팀, PMBOK, 터크만)"
          autocomplete="off"
          aria-label="주제 검색"
        />
      </div>
      <p class="result-count" id="result-count"></p>
    </section>

    <section class="topic-section">
      <ul class="topic-list" id="topic-list"></ul>
      <p class="empty-state" id="empty-state" hidden>검색 결과가 없습니다.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>정보관리기술사 학습 노트 · 순수 HTML/CSS/JS · GitHub Pages</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
